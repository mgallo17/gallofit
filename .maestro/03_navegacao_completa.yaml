appId: com.gallofit.app
---
# GalloFit — Teste E2E: Navegação completa
# Equivalente ao Playwright para Android

- launchApp

# Dashboard
- assertVisible:
    text: "Calorias"
- takeScreenshot: nav_01_dashboard

# → Refeições
- tapOn:
    text: "Refeições"
- assertVisible:
    text: "Refeições de hoje"
- takeScreenshot: nav_02_refeicoes

# → Treino
- tapOn:
    text: "Treino"
- assertVisible:
    text: "Treinos"
- takeScreenshot: nav_03_treino

# → Definições
- tapOn:
    text: "Definições"
- assertVisible:
    text: "Matheus Gallo"
- assertVisible:
    text: "Health Connect"
- takeScreenshot: nav_04_definicoes

# → Voltar ao Dashboard
- tapOn:
    text: "Início"
- assertVisible:
    text: "Calorias"
- takeScreenshot: nav_05_dashboard_final
