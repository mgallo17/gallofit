appId: com.gallofit.app
---
# GalloFit — Teste E2E: Dashboard principal
# Equivalente ao Playwright para Android

- launchApp

# Verificar que o dashboard carrega
- assertVisible:
    text: "Calorias"
    
- assertVisible:
    text: "Macros"

- assertVisible:
    text: "Treino de hoje"

# Verificar barra de navegação
- assertVisible:
    text: "Início"
    
- assertVisible:
    text: "Refeições"
    
- assertVisible:
    text: "Treino"
    
- assertVisible:
    text: "Definições"

# Screenshot do dashboard
- takeScreenshot: dashboard_inicial
